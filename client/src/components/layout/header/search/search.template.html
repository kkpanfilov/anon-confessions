<div class="search">
  <form class="searchForm" action="/search" method="get" role="search">
    <label class="searchFormLabel" for="search-input">Search</label>
    <span class="searchFormIcon" aria-hidden="true">🔍</span>
    <input
      class="searchFormInput"
      id="search-input"
      name="q"
      type="search"
      placeholder="Search confessions"
      autocomplete="off"
    />
    <button class="searchFormButton" type="submit">Search</button>
  </form>
</div>
