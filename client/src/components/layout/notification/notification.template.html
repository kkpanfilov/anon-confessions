<div class="notification" role="status" aria-live="polite" data-state="inactive">
  <div class="notificationIcon" aria-hidden="true">!</div>
  <div class="notificationBody">
    <p class="notificationBodyTitle"></p>
    <p class="notificationBodyMessage"></p>
  </div>
  <button class="notificationClose" type="button" aria-label="Close notification">&times;</button>
</div>
