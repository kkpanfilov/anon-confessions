<div class="notification" role="status" aria-live="polite" data-id="notification" data-state="inactive" data-notification-type="normal">
  <div class="notificationIcon" aria-hidden="true">!</div>
  <div class="notificationBody">
    <p class="notificationBodyTitle" data-id="notification-title"></p>
    <p class="notificationBodyMessage" data-id="notification-message"></p>
  </div>
  <button class="notificationClose" data-id="notification-close" type="button" aria-label="Close notification">&times;</button>
</div>
