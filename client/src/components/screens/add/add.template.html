<div class="add">
  <div class="addHeader">
    <h1 class="addTitle">New confession</h1>
    <p class="addSubtitle">Keep it honest, short, and anonymous.</p>
  </div>

  <form class="addForm">
    <label class="addLabel" for="confession">Your confession</label>
    <textarea
      class="addTextarea"
      id="confession"
      name="confession"
      placeholder="I never told anyone that..."
      rows="7"
    ></textarea>

    <div class="addMeta">
      <span class="addHint">Max 500 characters</span>
      <span class="addCount">0 / 500</span>
    </div>

    <div class="addNote">
      We remove names, doxxing, and threats. Everything else stays anonymous.
    </div>

    <label class="addCheckbox">
      <input type="checkbox" class="addCheckboxInput" />
      <span class="addCheckboxBox"></span>
      <span class="addCheckboxLabel">I understand this post is public.</span>
    </label>

    <div class="addActions">
      <button type="button" class="addButton">Publish confession</button>
    </div>
  </form>
</div>
