<div class="add">
  <div class="addHeader">
    <h1 class="addTitle">New confession</h1>
    <p class="addSubtitle">Keep it honest, short, and anonymous.</p>
  </div>

  <form class="addForm">
    <label class="addLabel" for="confession">Your confession</label>
    <textarea
      class="addTextarea"
      id="confession"
      name="content"
      placeholder="I never told anyone that..."
      rows="7"
      maxlength="500"
    ></textarea>

    <div class="addMeta">
      <span class="addHint">Max 500 characters</span>
      <span class="addCount" data-id="character-counter">0 / 500</span>
    </div>

    <div class="addActions">
      <button type="submut" class="addButton">Publish confession</button>
    </div>
  </form>
</div>
