<section class="confession">
  <div class="confessionHeader">
    <a href="/feed" class="confessionHeaderBack">Back to feed</a>

    <div class="confessionHeaderWrap">
      <span class="confessionHeaderWrapEyebrow">Anonymous confession</span>
      <h1 class="confessionHeaderWrapTitle">The full story, without filters</h1>
    </div>
  </div>

  <div class="confessionLayout">
    <article class="confessionCard">
      <div class="confessionCardMeta">
        <span class="confessionCardMetaItem" data-id="confession-id">#0001</span>
        <span class="confessionCardMetaDivider"></span>
        <span class="confessionCardMetaItem" data-id="confession-time">15 min ago</span>
      </div>

      <div class="confessionContent" data-id="confession-content">
        I keep telling myself that I am just tired, but the truth is I have been avoiding a decision
        that should have been made months ago.
      </div>

      <div class="confessionFooter">
        <button type="button" class="confessionLike">
          <span class="confessionLikeIcon">&#10084;</span>
          <span class="confessionLikes" data-id="confession-likes">12</span>
        </button>

        <div class="confessionActions">
          <button type="button" class="confessionAction">Share</button>
        </div>
      </div>
    </article>
  </div>
</section>
